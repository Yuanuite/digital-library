site_name: Yuan's Library
site_description: 个人数字图书馆
site_url: https://yuanuite.github.io/digital-library/
docs_dir: docs
theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换浅色模式
  features:
    - announce.dismiss
    - content.code.copy
    - content.code.annotate
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

nav:
  - 首页: index.md
  - 书籍:
    - 机器学习:
      - 斯坦福ML笔记:
        - 封面: books/ml/stanford-ml-notes/index.md
        - 第1周 · 引言&线性回归&线性代数: books/ml/stanford-ml-notes/ch01.md
        - 第2周 · 多变量线性回归&Octave: books/ml/stanford-ml-notes/ch02.md
        - 第3周 · 逻辑回归&正则化: books/ml/stanford-ml-notes/ch03.md
        - 第4周 · 神经网络表述: books/ml/stanford-ml-notes/ch04.md
        - 第5周 · 神经网络学习: books/ml/stanford-ml-notes/ch05.md
        - 第6周 · 应用建议&系统设计: books/ml/stanford-ml-notes/ch06.md
        - 第7周 · 支持向量机: books/ml/stanford-ml-notes/ch07.md
        - 第8周 · 聚类&降维: books/ml/stanford-ml-notes/ch08.md
        - 第9周 · 异常检测&推荐系统: books/ml/stanford-ml-notes/ch09.md
        - 第10周 · 大规模ML&OCR&总结: books/ml/stanford-ml-notes/ch10.md
        - 附件 · CS229复习&数学基础: books/ml/stanford-ml-notes/appendix.md
    - 灵性:
      - 与神对话:
        - 封面: books/spirituality/conversations-with-god/index.md
        - 第一卷 · 个人生活与真理: books/spirituality/conversations-with-god/vol1.md
        - 第二卷 · 全球议题: books/spirituality/conversations-with-god/vol2.md
        - 第三卷 · 宇宙真相: books/spirituality/conversations-with-god/vol3.md
        - 第四卷 · 与神为友: books/spirituality/conversations-with-god/vol4.md
        - 第五卷 · 与神合一: books/spirituality/conversations-with-god/vol5.md
    - 金融:
      - Why Stock Markets Crash:
        - 封面: books/finance/why-stock-markets-crash/index.md
        - 前言: books/finance/why-stock-markets-crash/preface.md
        - Ch1 · 金融崩盘: books/finance/why-stock-markets-crash/ch01.md
        - Ch2 · 金融市场基础: books/finance/why-stock-markets-crash/ch02.md
        - Ch3 · 崩盘是异常值: books/finance/why-stock-markets-crash/ch03.md
        - Ch4 · 正反馈机制: books/finance/why-stock-markets-crash/ch04.md
        - Ch5 · 泡沫与崩盘模型: books/finance/why-stock-markets-crash/ch05.md
        - Ch6 · 分形与离散标度不变性: books/finance/why-stock-markets-crash/ch06.md
        - Ch7 · 主要崩盘剖析: books/finance/why-stock-markets-crash/ch07.md
        - Ch8 · 新兴市场: books/finance/why-stock-markets-crash/ch08.md
        - Ch9 · 预测泡沫与崩盘: books/finance/why-stock-markets-crash/ch09.md
        - Ch10 · 2050 增长终结: books/finance/why-stock-markets-crash/ch10.md
        - 参考文献: books/finance/why-stock-markets-crash/references.md

use_directory_urls: false
markdown_extensions:
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
extra_css:
  - stylesheets/extra.css
  - https://cdn.jsdelivr.net/npm/pseudocode@latest/build/pseudocode.min.css
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml-full.js
  - https://cdn.jsdelivr.net/npm/pseudocode@latest/build/pseudocode.min.js
  - javascripts/pseudocode-render.js
