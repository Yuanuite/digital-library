site_name: Yuan's Library
site_description: 个人数字图书馆
site_url: https://yuanuite.github.io/digital-library/
docs_dir: docs
theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换浅色模式
  features:
    - announce.dismiss
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.prune
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

nav:
  - 首页: index.md
  - 馆藏:
    - 书籍:
      - books/index.md
      - 机器学习:
        - books/ml/index.md
        - 斯坦福ML笔记:
          - 封面: books/ml/stanford-ml-notes/index.md
          - 第1周 · 引言&线性回归&线性代数: books/ml/stanford-ml-notes/ch01.md
          - 第2周 · 多变量线性回归&Octave: books/ml/stanford-ml-notes/ch02.md
          - 第3周 · 逻辑回归&正则化: books/ml/stanford-ml-notes/ch03.md
          - 第4周 · 神经网络表述: books/ml/stanford-ml-notes/ch04.md
          - 第5周 · 神经网络学习: books/ml/stanford-ml-notes/ch05.md
          - 第6周 · 应用建议&系统设计: books/ml/stanford-ml-notes/ch06.md
          - 第7周 · 支持向量机: books/ml/stanford-ml-notes/ch07.md
          - 第8周 · 聚类&降维: books/ml/stanford-ml-notes/ch08.md
          - 第9周 · 异常检测&推荐系统: books/ml/stanford-ml-notes/ch09.md
          - 第10周 · 大规模ML&OCR&总结: books/ml/stanford-ml-notes/ch10.md
          - 附件 · CS229复习&数学基础: books/ml/stanford-ml-notes/appendix.md
      - 工程:
        - books/engineering/index.md
        - 论系统工程:
