      - 网络科学:
        - papers/network-science/index.md
        - 特征向量局域化:
          - 封面: papers/network-science/eigenvector-localization/index.md
          - 全文: papers/network-science/eigenvector-localization/paper.md
    - 笔记: notes/index.md
  - 关于: about.md

use_directory_urls: false
markdown_extensions:
  - pymdownx.snippets:
      base_path: docs
      auto_append:
        - snippets/abbreviations.md
  - abbr
  - footnotes
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.mark
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
extra_css:
  - stylesheets/extra.css
  - https://cdn.jsdelivr.net/npm/pseudocode@latest/build/pseudocode.min.css
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml-full.js
  - https://cdn.jsdelivr.net/npm/pseudocode@latest/build/pseudocode.min.js
  - javascripts/pseudocode-render.js
  - javascripts/translate-toggle.js
  - javascripts/abbr-tooltip.js
  - javascripts/footer-fix.js
extra:
  generator: false
