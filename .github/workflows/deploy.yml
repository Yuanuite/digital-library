name: Deploy Book Site
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.3'
          extended: true
      - name: Patch Chinese search tokenizer
        run: |
          cat > themes/hugo-book/i18n/zh.yaml << 'EOF'
          - id: Search
            translation: 搜索
          - id: Edit this page
            translation: 编辑本页
          - id: Last modified by
            translation: 最后修改者
          - id: bookSearchConfig
            translation: |
              {
                encode: false,
                tokenize: function(str) {
                  var tokens = [];
                  var words = str.split(/\s+/);
                  for (var i = 0; i < words.length; i++) {
                    var parts = words[i].match(/[\x00-\x7F]+|[^\x00-\x7F]/g) || [];
                    tokens = tokens.concat(parts);
                  }
                  return tokens;
                }
              }
          EOF
      - name: Build
        run: hugo --gc --minify
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
