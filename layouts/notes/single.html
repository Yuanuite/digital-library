{{/* 笔记详情页：日期 + 标签 meta 行 + 正文。*/}}
{{ define "main" }}
  <article class="markdown book-article post">
    <header class="post-header">
      <h1 class="post-title">{{ partial "docs/title" . }}</h1>
      <div class="post-meta">
        {{ with .Date }}<time datetime="{{ .Format "2006-01-02" }}">{{ .Format "2006-01-02" }}</time>{{ end }}
        {{ range .GetTerms "tags" }}
          <a href="{{ .RelPermalink }}" class="chip">{{ .LinkTitle }}</a>
        {{ end }}
      </div>
    </header>
    {{- .Content -}}
  </article>
{{ end }}
